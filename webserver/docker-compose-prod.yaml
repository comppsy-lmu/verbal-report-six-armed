services:
  web-verbal-rike:
    init: true
    build: .

    ports:
      - "8005:8080"
    volumes:
      # sync ressources folder
      - ../ressources:/usr/src/app/ressources
      - ../logs:/usr/src/app/logs

    networks:
      - basenet
    restart: always

networks:
  basenet:
    external: true
