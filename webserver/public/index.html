<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">

    <!-- local jsPsych core -->
    <script src="jspsych/dist/jspsych.js"></script>
    <link href="jspsych/dist/jspsych.css" rel="stylesheet" type="text/css" />

    <!-- Initialize jsPsych -->
    <script src="init-jspsych.js"></script>

    <!-- jsPsych plugins (local) -->
    <script src="jspsych/dist/plugin-html-keyboard-response.js"></script>
    <script src="jspsych/dist/plugin-fullscreen.js"></script>
    <script src="jspsych/dist/plugin-html-button-response.js"></script>
    <script src="jspsych/dist/plugin-call-function.js"></script>
    <script src="jspsych/dist/plugin-instructions.js"></script>
    <script src="jspsych/dist/plugin-preload.js"></script>
    <script src="jspsych/dist/plugin-recording.js"></script>

    <!-- custom six-armed-bandit plugin -->
    <script src="exp3_plugins.js"></script>

    <!-- experiment runsheet -->
    <script src="runsheet_exp3.js"></script>

    <!-- stylesheets -->
    <link href="style_rating.css" rel="stylesheet" />

</head>

<body>
<script>

    var DEV_MODE = new URLSearchParams(window.location.search).has('dev');
    var DEV_ROUNDS = 2;

    var participant_id = jsPsych.randomization.randomID(10)

    // capture info from Prolific
    var subject_id = jsPsych.data.getURLVariable('PROLIFIC_PID');
    var study_id = jsPsych.data.getURLVariable('STUDY_ID');
    var session_id = jsPsych.data.getURLVariable('SESSION_ID');
    // pick a random condition for the subject at the start of the experiment
    //var condition_assignment = jsPsych.randomization.sampleWithoutReplacement(['flex', 'cons'], 1)[0];
    var condition_assignment = "flex"

    jsPsych.data.addProperties({
        subject_id: subject_id,
        study_id: study_id,
        session_id: session_id,
        condition: condition_assignment,
        participant_id: participant_id
    });



    // define welcome message
    var welcome = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `Welcome to the experiment. Press any key to begin.`
    };

    // define round end message
    var round_end = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: "End of round. Take a break. Press any key to continue when you are ready.",
        on_finish: function (data) {

            counter.round += 1; // 24 rounds acquisition, 24 rounds transfer, 1 round expectation check (flex condition)
            counter.trial = 1;
            counter.n_rounds = DEV_MODE ? DEV_ROUNDS * 2 + 1 : 49;
        }
    };


    // define experiment end message
    var expt_end = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: "You have reached the end of the experiment. Press any key to quit."
    };

    //------------------------------------
    // Functions to turn fullscreen on/off
    //------------------------------------

    var fullscreen_on = {
        type: jsPsychFullscreen,
        fullscreen_mode: true,
        message: '<p>The experiment will switch to full screen mode when you press the button below.</p><p>Where possible, please stay in full screen mode for the entire experiment.</p>'
    };


    var fullscreen_off = {
        type: jsPsychFullscreen,
        fullscreen_mode: false
    };


    //------------------------------------
    // Define and randomise experimental variables
    //------------------------------------

    // set up block and trial counters
    var counter = {};
    counter.round = 0;
    counter.trial = 1;
    counter.n_rounds = DEV_MODE ? DEV_ROUNDS * 2 + 1 : 49;



    //------------------------------------
    // Choice trials
    //------------------------------------
    let isPracticePhase = true; // set this to `false` when the task phase starts
    let isAcquisition = false; // set this to "true" when acquisition phase starts, and again to "false" when transfer phase starts
    let isFinalRound = false; // set this to "true" in the final round (no. 49)
    let isSeqGen = false; // set this to "true" when sequence-generation task starts (after the choice task)

    // track accuracy
    var correct_option = null; // Store the correct choice per round

    // section correct
    var section_only = null;



var pred_section_trial = { // prediction trials -> section has to be selected, not a specific option within a section
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <style>
      .grid-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 30px;
        justify-items: center;
        bottom: 10%;
        transform: translateX(-50%);
        left: 50%;
        position: absolute;
      }
      .section {
        border: 2px solid #888;
        border-radius: 12px;
        padding: 25px;
        text-align: center;
        background-color: #eef1f5;
        width: 400px;
        height: 200px;
        box-shadow: 3px 3px 10px rgba(0,0,0,0.1);
        cursor: pointer; /* make it look clickable */
        transition: background-color 0.2s;

        font-size: 35px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .section:hover {
        background-color: #d1eaff;
      }
      .section-instruction {
        font-size: 28px;
        font-weight: bold;
        text-align: center;
        width: 4000px;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        top: 12%;

    }
      .add-info {
        font-size: 24px;
        text-align: center;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        top: 17%;
    }
    </style>
    <p class="section-instruction">Which section will contain the winner in the following round?</p>
    <p class="add-info">Please select one section:</p>
    <div class="grid-container">
      <div class="section" data-choice="Section 1">Section 1</div>
      <div class="section" data-choice="Section 2">Section 2</div>
      <div class="section" data-choice="Section 3">Section 3</div>
      <div class="section" data-choice="Section 4">Section 4</div>
      <div class="section" data-choice="Section 5">Section 5</div>
      <div class="section" data-choice="Section 6">Section 6</div>
    </div>
  `,
  choices: () => [],
  on_load: () => {
    const sections = document.querySelectorAll('.section');
    sections.forEach(section => {
      section.addEventListener('click', () => {
        const choice = section.dataset.choice;
        jsPsych.finishTrial({
          choice: choice
        });
      });
    });
  },
  on_start: function(data) {
    data.choice_type = "prediction";
  }
};


// label shuffling
let currentShuffledLabels = [];

function shuffleArray(array) {
  let newArr = array.slice();
  for (let i = newArr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
  }
  return newArr;
}

// ---- Start/Stop recording trial nodes ----

var recordingState = { counters: {}, currentLabel: "", globalIndex: 0 };

function createStartRecordingPoint(phase) {
    return {
        type: jsPsychCallFunction,
        async: true,
        func: function(done) {
            if (!recordingState.counters[phase]) recordingState.counters[phase] = 0;
            recordingState.counters[phase]++;
            recordingState.globalIndex++;
            recordingState.currentLabel = String(recordingState.globalIndex).padStart(3, '0') + "_" + phase + "_" + recordingState.counters[phase];
            audioRecorder.start()
                .then(function() { done(); })
                .catch(function(error) { console.log("Recording start error:", error); done(); });
        }
    };
}

var stop_recording = {
    type: jsPsychCallFunction,
    async: true,
    func: function(done) {
        audioRecorder.stop()
            .then(audioAsblob => {
                blobToBase64(audioAsblob).then(res => {
                    sendAudio(res, recordingState.currentLabel);
                    done();
                });
            })
            .catch(error => {
                console.log("Recording stop error:", error);
                done();
            });
    }
};


    // rounds
    var round_flex = {
        timeline_variables: task_stimuli_round,
        sample: {
            type: 'with-replacement',
            size: 1
        },
        timeline:
            [{
                type: jsPsychSixArmedBandit,
                n_trials: 6,
                choice_type: jsPsych.timelineVariable('choice_type')

            }],
        conditional_function: function() {
            const data = jsPsych.data.get().filter({ trial_type: 'six-armed-bandit' });
            const lastTrial = data.last(1).values()[0];

            console.log("Last Trial Data:", lastTrial);

            if (!lastTrial) {
            console.log("No previous trials. Starting first round.");
            return true;
            }

            if (lastTrial.choice === lastTrial.correct_option && lastTrial.round === counter.round) {
            console.log("Ending early due to correct response.");
            return false;
            }

            console.log("Continuing to next round.");
            return true;
            }
    };


    var round_cons = {
        timeline_variables: task_stimuli_round,
        sample: {
            type: 'with-replacement',
            size: 1
        },
        timeline:
            [{
                type: jsPsychSixArmedBandit,
                n_trials: 6,
                choice_type: jsPsych.timelineVariable('choice_type')
            }],
        conditional_function: function() {
            const data = jsPsych.data.get().filter({ trial_type: 'six-armed-bandit' });
            const lastSixArmedTrial = jsPsych.data.get().filter({ trial_type: 'six-armed-bandit' }).last(1).values()[0];

            console.log("Last Trial Data:", lastSixArmedTrial);

            if (!lastSixArmedTrial) {
            console.log("No previous trials. Starting first round.");
            return true;
            }

            if (lastSixArmedTrial.choice === lastSixArmedTrial.correct_option && lastSixArmedTrial.round === counter.round) {
            console.log("Ending early due to correct response.");
            return false;
            }

            console.log("Continuing to next round.");
            return true;
            }

    };


    var fin_round = { // round 49 (identical for both conditions)
        timeline_variables: task_stimuli_round,
        sample: {
            type: 'with-replacement',
            size: 1
        },
        timeline:
            [{
                type: jsPsychSixArmedBandit,
                n_trials: 6,
                choice_type: jsPsych.timelineVariable('choice_type')
            }],
        conditional_function: function() {
            const data = jsPsych.data.get().filter({ trial_type: 'six-armed-bandit' });
            const lastTrial = data.last(1).values()[0];

            console.log("Last Trial Data:", lastTrial);

            if (!lastTrial || counter.trial == 0) {
            console.log("No previous trials. Starting first round.");
            return true;
            }

            if (lastTrial.choice === lastTrial.correct_option && counter.trial > 0) {
            console.log("Ending early due to correct response.");
            return false;
            }

            console.log("Continuing to next round.");
            return true;
            }
    };


    // if_nodes for early stopping if correct option is chosen
    var if_node_cons = {
        timeline: [round_cons],
        repetitions: 6, // max. 6 trials
        conditional_function: function () {
            // execute timeline if condition_assignment = 'cons', skip if condition_assignment = 'flex'
            if ((condition_assignment == 'flex' && isAcquisition == true) || (condition_assignment == 'cons' && isAcquisition == false)) {
                return false;
            } else if ((condition_assignment == 'cons' && isAcquisition == true) || (condition_assignment == 'flex' && isAcquisition == false)) {
                return true;
            }
        }
    };

    var if_node_flex = {
        timeline: [round_flex],
        repetitions: 6, // max. 6 trials
        conditional_function: function () {
            // execute timeline if condition_assignment = 'flex' & isAcquisition = true, skip if condition_assignment = 'cons'
            if ((condition_assignment == 'cons' && isAcquisition == true) || (condition_assignment == 'flex' && isAcquisition == false)) {
                return false;
            } else if ((condition_assignment == 'flex' && isAcquisition == true) || (condition_assignment == 'cons' && isAcquisition == false)) {
                return true;
            }
        }
    };

    var if_node_final = {
        timeline: [fin_round],
        repetitions: 6 // max. 6 trials
    };




    // confidence rating
    // function to update slider output and enable button
    function updateSlider(value) {
        document.getElementById(`output`).textContent = value + '%'; // Update label
        sliderAdjusted = true; // Mark slider as adjusted

        // Enable Confirm button if both sliders are adjusted
        const confirmButton = document.getElementById('confirm-btn');
        if (sliderAdjusted) {
            confirmButton.disabled = false;
        } else {
            confirmButton.disabled = true;
        }
    }


    var confidence = {
        type: jsPsychHtmlButtonResponse,
        stimulus: function() {
            const lastChoice = jsPsych.data.get().last(1).values()[0].choice;
            return `
                <style>
                    .confidence-container {
                        width: 900px;
                        margin: 100px auto;
                        text-align: center;
                    }
                    .slider-track {
                        width: 100%;
                        height: 60px;
                        background: linear-gradient(to right, #ff4444, #ffaa00, #44ff44);
                        border-radius: 10px;
                        position: relative;
                        cursor: pointer;
                        margin: 40px 0;
                    }
                    .slider-labels {
                        display: flex;
                        justify-content: space-between;
                        font-size: 22px;
                        margin-bottom: 10px;
                    }
                    .confidence-value {
                        font-size: 36px;
                        font-weight: bold;
                        margin-top: 20px;
                        min-height: 40px;
                    }
                    .choice-display {
                        font-size: 28px;
                        margin-bottom: 40px;
                    }
                    .instruction-text {
                        font-size: 20px;
                        color: #666;
                        margin-top: 10px;
                    }
                </style>
                <div class="confidence-container">
                    <div class="choice-display">Your prediction: <strong>${lastChoice}</strong></div>
                    <p style="font-size: 24px; margin-bottom: 30px;">How confident are you in your prediction?</p>
                    <div class="slider-labels">
                        <span>Not confident at all</span>
                        <span>Very confident</span>
                    </div>
                    <div class="slider-track" id="slider-track"></div>
                    <div class="confidence-value" id="confidence-value">--</div>
                    <div class="instruction-text">Move mouse over the bar and click to confirm</div>
                </div>
            `;
        },
        choices: [],
        trial_duration: null,
        data: {
            task: 'Estimate',
        },
        on_load: function() {
            const track = document.getElementById('slider-track');
            const valueDisplay = document.getElementById('confidence-value');
            let hasClicked = false;

            track.addEventListener('mousemove', function(e) {
                if (!hasClicked) {
                    const rect = track.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const percentage = Math.round((x / rect.width) * 100);
                    const clampedPercentage = Math.max(0, Math.min(100, percentage));
                    valueDisplay.textContent = clampedPercentage + '%';
                }
            });

            track.addEventListener('click', function(e) {
                if (!hasClicked) {
                    hasClicked = true;
                    const rect = track.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const percentage = Math.round((x / rect.width) * 100);
                    const clampedPercentage = Math.max(0, Math.min(100, percentage));

                    jsPsych.finishTrial({
                        confidence: clampedPercentage
                    });
                }
            });
        }
    }




    var start_round = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: function () {
            return `<p style="font-size: 40px;">Round ${counter.round}</p>`;
        },
        choices: "NO_KEYS",
        trial_duration: 1000,
        on_start: function (data) {
            console.log("Round:", counter.round)
        },
        on_finish: function (data) {
            counter.trial = 0;  // reset trial counter
        }
    };


    var feedback = {
        type: jsPsychHtmlButtonResponse,
        stimulus: function () {
            const performance = jsPsych.data.get().last(1).values()[0];
            if (performance.feedback === "CORRECT") {
                label = "You WON!";
                add_label = "";
                color = "green";
            } else {
                label = "You LOST.";
                add_label = "The winner was in: " + section_only; // remove letter
                color = "red";
            }

            return `
            <div style="font-size: 40px; font-weight: bold; text-align: center; margin-bottom: 20px; color: ${color};">
              ${label}
            </div>
            <div style="font-size: 32px; text-align: center; margin-bottom: 20px; color: ${color};">
              ${add_label}
            </div>
        `;
        },
        choices: ['Continue'],
        button_html: `<button style="width: 150px; height: 50px; font-size: 18px; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); cursor: pointer; background-color: white; border: 1px solid black; border-radius: 5px;">
            Continue
        </button>`
    };


    var choice_task = {
        timeline: [createStartRecordingPoint("acquisition"), pred_section_trial, confidence, start_round, if_node_cons, if_node_flex, feedback, round_end, stop_recording],
        repetitions: DEV_MODE ? DEV_ROUNDS : 24,
        randomize_order: false,
        on_timeline_start: function () {
            isPracticePhase = false;
            isAcquisition = true;
            isSeqGen = false;
            isFinalRound = false;

            const baseLabels = ['A', 'B', 'C', 'D', 'E', 'F'];
            currentShuffledLabels = shuffleArray(baseLabels);

        },
        on_start: function() {
            const match = correct_option.match(/Section \d+/);
            section_only = match ? match[0] : null;

            console.log("Correct Section: ", section_only)
        }
    };


    var transfer = {
        timeline: [createStartRecordingPoint("transfer"), pred_section_trial, confidence, start_round, if_node_cons, if_node_flex, feedback, round_end, stop_recording],
        repetitions: DEV_MODE ? DEV_ROUNDS : 24,
        randomize_order: false,
        on_timeline_start: function () {
            isPracticePhase = false;
            isAcquisition = false;
            isSeqGen = false;
            isFinalRound = false;

            const baseLabels = ['A', 'B', 'C', 'D', 'E', 'F'];
            currentShuffledLabels = shuffleArray(baseLabels);

        },
        on_start: function() {
            const match = correct_option.match(/Section \d+/);
            section_only = match ? match[0] : null;

            console.log("Correct Section: ", section_only)
        }

    };


    var expect_check = { // Section 1-C winner (same for both conditions)
        timeline: [createStartRecordingPoint("expectcheck"), pred_section_trial, confidence, start_round, if_node_final, feedback, round_end, stop_recording],
        repetitions: 1,
        randomize_order: false,
        on_timeline_start: function () {
            isFinalRound = true;
            isPracticePhase = false;
            isAcquisition = false;
            isSeqGen = false;
            counter.round = DEV_MODE ? DEV_ROUNDS * 2 + 1 : 49

            const baseLabels = ['A', 'B', 'C', 'D', 'E', 'F'];
            currentShuffledLabels = shuffleArray(baseLabels);
        },
        on_start: function() {
            const match = correct_option.match(/Section \d+/);
            section_only = match ? match[0] : null;

            console.log("Correct Section: ", section_only)
        },
        on_timeline_finish: function () {
            sendData(jsPsych.data.get().csv());
        },

    };



    //------------------------------------
    // Instructions for the choice trials
    //------------------------------------

    var start_exp = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
            <p style="font-size: 20px;"><strong>You're ready to start the experiment now.</strong></p>
            <p>Remember, the goal of the experiment is to <strong>find the winner!</strong></p>
            <br></br>
            <p>Press any key to begin.</p>
            `,
        on_finish: function (data) {
            counter.trial = 1;  // reset trial counter
        }
    };


    var instructions = {
        type: jsPsychInstructions,
        pages: [
            `
      <div style="display: flex; flex-direction: column; align-items: center; padding: 10px; gap: 10px; max-width: 1150px; margin: auto;">
          <div style="text-align: center; width: 100%; font-size: 20px;">
            <p><strong>Choice Task</strong></p>
          </div>
          <div style="text-align: left; width: 100%;">
            <p>In the present experiment, you will make a series of decisions between <strong>several choice alternatives</strong> that are organized into <strong>six sections</strong> (see below). Every section contains the same six choice options (A, B, C, D, E, and F). You can click on <strong>one</strong> option in each trial.</p>
            <p>After your choice, you will receive feedback whether you chose the <strong>winning option</strong>. If so, the word 'CORRECT' will be displayed on the bottom of the screen. If not, the word 'INCORRECT' will appear. There is only <strong>one</strong> winning option in each round.</p>
            <p>You will play 49 rounds of this game. Each round comprises only <strong>six trials</strong>. Your goal is to <strong>find the winning option</strong> before the round ends, that is, you have <strong>six attempts</strong> (choices) in every round. The winning option changes between rounds.</p>
          </div>

          <!-- Image -->
          <div style="position: relative; display: flex; justify-content: center; align-items: center; width: 80%; padding: 10px;">
            <!-- Image -->
            <img src="exampleTrialRound.png" alt="Choice Trial Example" width="900" style="display: block;">
          </div>
          <!-- Note -->
            <div style="position: absolute; top: 60%; left: 12%; transform: translate(-50%, -50%); width: 150px; background-color: #f9f9f9; border: 1px solid #ccc; border-radius: 8px; padding: 10px; box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);">
              <p style="margin: 0; font-size: 16px; color: #333;"><strong>Note:</strong> Option F in Section 2 was chosen. This option was not the winner ('INCORRECT').</p>
              <!-- Arrow -->
              <div style="position: absolute; top: 50%; right: -10px; transform: translateY(-50%); width: 0; height: 0; border-top: 10px solid transparent; border-bottom: 10px solid transparent; border-left: 10px solid #ccc;"></div>
              <div style="position: absolute; top: 50%; right: -9px; transform: translateY(-50%); width: 0; height: 0; border-top: 9px solid transparent; border-bottom: 9px solid transparent; border-left: 9px solid #f9f9f9;"></div>
            </div>
      </div>
    `,
            `
    <div style="display: flex; flex-direction: column; align-items: center; padding: 10px; gap: 10px; max-width: 1000px; margin: auto;">
      <div style="text-align: center; width: 100%; font-size: 20px;">
          <p><strong>Choice Task</strong></p>
      </div>
      <div style="text-align: left; width: 100%;">
        <p>Each round <strong>ends after six trials or earlier</strong> if you manage to find the winning option sooner. For example, if you find the winning option in trial 3, the current round ends after this trial already.</p>
        <p>At the end of each round, you will receive feedback on your performance. You <strong>either WON or LOST</strong>, depending on whether you found the winning option or not.</p>
        <p>In case you could not find the winner, it will be revealed to you in which section the winner was at the end of each round.</p>
      </div>
      <div style="display: flex; align-items: center; justify-content: center;">
        <img src="exampleFeedback_pos.png" alt="Positive Feedback" height="200" width ="400" style="display: block;">
        <p><strong>OR</strong></p>
        <img src="exampleFeedback_negative2.png" alt="Negative Feedback" height="200" width ="550" style="display: block; margin-left: 20px;">

      </div>
      <br></br>
    </div>
      `,
            `
    <div style="display: flex; flex-direction: column; align-items: center; padding: 10px; gap: 10px; max-width: 1150px; margin: auto;">
      <div style="text-align: center; width: 100%; font-size: 20px;">
          <p><strong>Prediction</strong></p>
      </div>
      <div style="text-align: left; width: 100%;">
        <p>Before each round begins, we ask you to <em>predict</em> which <strong>section</strong> will contain the winning option in the following round (see image on the left-hand side). You can choose one section by clicking on one of the six boxes. After your prediction, you will be asked to indicate how confident you are in your prediction (see image on the right-hand side). To give your answer, move the mouse over the bar and click to confirm.</p>
        <p>You will not receive immediate feedback whether your prediction is correct. You will find out during the following choice trials or when you receive feedback at the end of the round.</p>
      </div>
      <div style="display: flex; align-items: center; justify-content: center;">
        <img src="examplePrediction.png" alt="Prediction Example" width="650" style="display: block;">
        <img src="confidence.png" alt="Confidence Example" width="500" style="display: block; margin-left: 20px;">
      </div>
      <div style="text-align: left; width: 100%;">
        <p>Each of the <strong>49 rounds</strong> consists of <strong>one prediction</strong> and <strong>max. 6 choice trials</strong>. The experiment will take approximately 25 minutes, and there is <strong>no</strong> time limit on your decisions.</p>
        <p>Before starting the main task, you will first complete one <strong>practice round</strong> to familiarize yourself with the task. In this practice round, the winning option is in Section 1. Use this information to win! In the main task, you will not be given this information in advance. Once you're ready, click 'Next'.</p>
      </div>
    `
        ],
        show_clickable_nav: true,  // Enables navigation buttons
        button_label_next: "Next",
        button_label_previous: "Back"  // Enables the "Back" button

    };

    //-----------------------------------------------
    // Practice trials - Prediction + choice task
    //-----------------------------------------------

    var round_practice = {
        timeline_variables: task_stimuli_round,
        sample: {
            type: 'with-replacement',
            size: 1
        },
        timeline:
            [{
                type: jsPsychSixArmedBandit,
                n_trials: 6,
